[build]
  command = "pnpm build:netlify"
  publish = "dist"
  edge_functions = "netlify/edge-functions"

[context.production]
  command = "pnpm build"

[context.deploy-preview]
  # Temporarily skip deploy previews for this split PR stack to preserve Netlify minutes.
  ignore = """
if [ "$HEAD" = "codex/admin-table-audit-stabilization" ] || [ "$HEAD" = "codex/admin-playground-docs-table-guidance" ] || [ "$HEAD" = "codex/failed-generation-observability-retry-core-final" ]; then
  echo "Skipping deploy preview for split PR branch: $HEAD"
  exit 0
fi
exit 1
"""

[build.environment]
  NODE_VERSION = "20"
  # Vite exposes VITE_* vars to browser bundles by design.
  # Supabase URL + anon key are public client values (RLS must protect data).
  # DATABASE_URL and DIRECT_DATABASE_URL are for Umami backend deployments and must stay server-side.
  # Google Maps browser keys start with "AIza" and are expected in client bundles (referrer-restricted key).
  # The Mapbox browser access token is also intentionally public and domain-restricted.
  SECRETS_SCAN_OMIT_KEYS = "VITE_GOOGLE_MAPS_API_KEY,VITE_MAPBOX_ACCESS_TOKEN,VITE_GEMINI_API_KEY,GEMINI_API_KEY,OPENAI_API_KEY,ANTHROPIC_API_KEY,OPENROUTER_API_KEY,TF_ADMIN_API_KEY,VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY,SUPABASE_SERVICE_ROLE_KEY,VITE_UMAMI_SCRIPT_URL,VITE_UMAMI_WEBSITE_ID,DATABASE_URL,DIRECT_DATABASE_URL,SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_SECRET,VITE_PADDLE_CLIENT_TOKEN,PADDLE_API_KEY,PADDLE_WEBHOOK_SECRET,PADDLE_PRICE_ID_TIER_MID,PADDLE_PRICE_ID_TIER_PREMIUM,AIza"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIza"

[functions."ai-generate-worker-cron"]
  schedule = "*/1 * * * *"

[[plugins]]
  package = "./netlify/plugins/site-og-build-cache"

[dev]
  targetPort = 5173

