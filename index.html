<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TravelFlow</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="description" content="Plan and share travel routes with timeline and map previews in TravelFlow." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TravelFlow" />
    <meta property="og:title" content="TravelFlow" />
    <meta property="og:description" content="Plan and share travel routes with timeline and map previews in TravelFlow." />
    <meta property="og:image" content="/api/og/site" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TravelFlow" />
    <meta name="twitter:description" content="Plan and share travel routes with timeline and map previews in TravelFlow." />
    <meta name="twitter:image" content="/api/og/site" />
    <link rel="preload" href="/fonts/bricolage-grotesque/bricolage-grotesque-latin-ext.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/bricolage-grotesque/bricolage-grotesque-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/space-grotesk/space-grotesk-latin-ext.woff2" as="font" type="font/woff2" crossorigin>
    <style>
      /* Custom scrollbar for the timeline */
      .timeline-scroll::-webkit-scrollbar {
        height: 8px;
        width: 8px;
        background-color: #f3f4f6;
      }
      .timeline-scroll::-webkit-scrollbar-thumb {
        background-color: #d1d5db;
        border-radius: 4px;
      }
      body {
        overscroll-behavior-y: none;
        margin: 0;
        background: #ffffff;
        color: #0f172a;
      }

      .tf-boot-shell {
        min-height: 100vh;
        width: 100%;
        background: #ffffff;
        color: #0f172a;
        font-family: "Bricolage Grotesque", "Space Grotesk", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .tf-boot-header {
        border-bottom: 1px solid #e2e8f0;
        background: #ffffff;
      }

      .tf-boot-header-inner {
        height: 72px;
        max-width: 1600px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        align-items: center;
        gap: 24px;
        padding: 0 24px;
      }

      .tf-boot-brand {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        min-width: 0;
      }

      .tf-boot-logo-frame {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 46px;
        width: 46px;
        border-radius: 14px;
        background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
        box-shadow: 0 14px 30px rgba(79, 70, 229, 0.18);
      }

      .tf-boot-logo-image {
        height: 28px;
        width: 28px;
        display: block;
      }

      .tf-boot-wordmark {
        font-size: 2rem;
        line-height: 1;
        font-weight: 900;
        letter-spacing: -0.035em;
        color: #111827;
      }

      .tf-boot-nav {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 22px;
        min-width: 0;
      }

      .tf-boot-nav-link,
      .tf-boot-action-chip,
      .tf-boot-action-button,
      .tf-boot-line,
      .tf-boot-card,
      .tf-boot-metric,
      .tf-boot-trip-day,
      .tf-boot-trip-block,
      .tf-boot-trip-side-card,
      .tf-boot-trip-status,
      .tf-boot-trip-toolbar-pill {
        border-radius: 999px;
        background: linear-gradient(90deg, #e2e8f0 0%, #f8fafc 45%, #e2e8f0 100%);
        background-size: 200% 100%;
        animation: tf-boot-shimmer 1.4s linear infinite;
      }

      .tf-boot-nav-link {
        height: 14px;
        flex: 0 0 auto;
      }

      .tf-boot-nav-link:nth-child(1) { width: 72px; }
      .tf-boot-nav-link:nth-child(2) { width: 94px; }
      .tf-boot-nav-link:nth-child(3) { width: 110px; }
      .tf-boot-nav-link:nth-child(4) { width: 48px; }
      .tf-boot-nav-link:nth-child(5) { width: 64px; }

      .tf-boot-actions {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .tf-boot-action-chip,
      .tf-boot-action-button {
        flex: 0 0 auto;
        border: 1px solid #e2e8f0;
        background-color: #ffffff;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
      }

      .tf-boot-action-chip {
        height: 44px;
      }

      .tf-boot-action-chip--locale {
        width: 146px;
      }

      .tf-boot-action-chip--login {
        width: 96px;
      }

      .tf-boot-action-button {
        height: 44px;
        width: 140px;
        background:
          linear-gradient(135deg, rgba(79, 70, 229, 0.92) 0%, rgba(99, 102, 241, 0.92) 100%);
        box-shadow: 0 10px 22px rgba(79, 70, 229, 0.18);
      }

      .tf-boot-main {
        min-height: calc(100vh - 73px);
        background: #ffffff;
      }

      .tf-boot-page {
        max-width: 1600px;
        margin: 0 auto;
        padding: 28px 24px 40px;
      }

      .tf-boot-page--trip {
        display: none;
      }

      html[data-tf-boot-route="trip"] .tf-boot-page--marketing {
        display: none;
      }

      html[data-tf-boot-route="trip"] .tf-boot-page--trip {
        display: block;
      }

      .tf-boot-hero {
        border-radius: 28px;
        border: 1px solid #e2e8f0;
        background:
          radial-gradient(circle at top left, rgba(224, 231, 255, 0.42), transparent 48%),
          linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
        padding: 28px;
      }

      .tf-boot-hero-lines {
        display: grid;
        gap: 14px;
        max-width: 720px;
      }

      .tf-boot-line {
        height: 14px;
      }

      .tf-boot-line--headline {
        width: min(540px, 100%);
        height: 24px;
      }

      .tf-boot-line--body-lg {
        width: min(640px, 100%);
      }

      .tf-boot-line--body-md {
        width: min(520px, 85%);
      }

      .tf-boot-line--body-sm {
        width: min(360px, 62%);
      }

      .tf-boot-hero-actions {
        display: flex;
        gap: 12px;
        margin-top: 22px;
      }

      .tf-boot-hero-action {
        border-radius: 16px;
        border: 1px solid #e2e8f0;
        background: #ffffff;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
      }

      .tf-boot-hero-action--primary {
        width: 156px;
        height: 48px;
      }

      .tf-boot-hero-action--secondary {
        width: 134px;
        height: 48px;
      }

      .tf-boot-marketing-grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        margin-top: 22px;
      }

      .tf-boot-card {
        min-height: 150px;
        border-radius: 24px;
        border: 1px solid #e2e8f0;
        background-color: #ffffff;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.04);
      }

      .tf-boot-trip-status {
        height: 14px;
        width: min(280px, 46vw);
        margin-bottom: 18px;
      }

      .tf-boot-trip-summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
      }

      .tf-boot-trip-summary-copy {
        display: grid;
        gap: 12px;
        flex: 1 1 auto;
        min-width: 0;
      }

      .tf-boot-trip-toolbar {
        display: flex;
        gap: 10px;
        flex: 0 0 auto;
      }

      .tf-boot-trip-toolbar-pill {
        height: 42px;
        width: 42px;
        border: 1px solid #e2e8f0;
        background-color: #ffffff;
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.05);
      }

      .tf-boot-trip-layout {
        display: grid;
        gap: 18px;
        grid-template-columns: minmax(0, 1fr) 290px;
      }

      .tf-boot-trip-canvas {
        min-height: 460px;
        border: 1px solid #e2e8f0;
        border-radius: 30px;
        background:
          linear-gradient(180deg, rgba(248, 250, 252, 0.82), rgba(255, 255, 255, 0.98));
        overflow: hidden;
      }

      .tf-boot-trip-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        border-bottom: 1px solid #e2e8f0;
      }

      .tf-boot-trip-day {
        height: 76px;
        border-right: 1px solid #eef2f7;
        background-color: rgba(255, 255, 255, 0.64);
      }

      .tf-boot-trip-day:last-child {
        border-right: 0;
      }

      .tf-boot-trip-body {
        padding: 22px 18px;
      }

      .tf-boot-trip-block {
        height: 74px;
        border-radius: 22px;
        border: 1px solid #e2e8f0;
        background-color: rgba(255, 255, 255, 0.94);
      }

      .tf-boot-trip-block + .tf-boot-trip-block {
        margin-top: 14px;
      }

      .tf-boot-trip-block--thin {
        height: 56px;
      }

      .tf-boot-trip-sidebar {
        display: grid;
        gap: 14px;
      }

      .tf-boot-trip-side-card {
        min-height: 180px;
        border-radius: 26px;
        border: 1px solid #e2e8f0;
        background-color: #ffffff;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
      }

      .tf-boot-trip-side-card--map {
        min-height: 280px;
      }

      .tf-boot-metrics {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .tf-boot-metric {
        height: 86px;
        border-radius: 22px;
        border: 1px solid #e2e8f0;
        background-color: #ffffff;
      }

      .tf-boot-surface {
        margin-top: 22px;
        min-height: 220px;
        border: 1px solid #e2e8f0;
        border-radius: 28px;
        background:
          linear-gradient(180deg, rgba(248, 250, 252, 0.82), rgba(255, 255, 255, 0.98));
      }

      @keyframes tf-boot-shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      @media (max-width: 1200px) {
        .tf-boot-header-inner {
          grid-template-columns: auto 1fr auto;
          gap: 18px;
        }

        .tf-boot-nav {
          gap: 18px;
        }

        .tf-boot-trip-layout {
          grid-template-columns: minmax(0, 1fr);
        }
      }

      @media (max-width: 960px) {
        .tf-boot-header-inner {
          grid-template-columns: auto auto;
        }

        .tf-boot-nav {
          display: none;
        }

        .tf-boot-marketing-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 640px) {
        .tf-boot-header-inner {
          height: 64px;
          padding: 0 14px;
          gap: 12px;
        }

        .tf-boot-logo-frame {
          height: 40px;
          width: 40px;
          border-radius: 12px;
        }

        .tf-boot-logo-image {
          height: 24px;
          width: 24px;
        }

        .tf-boot-wordmark {
          font-size: 1.6rem;
        }

        .tf-boot-page {
          padding: 18px 14px 24px;
        }

        .tf-boot-action-chip--locale,
        .tf-boot-action-chip--login {
          display: none;
        }

        .tf-boot-action-button {
          width: 104px;
          height: 40px;
        }

        .tf-boot-hero {
          padding: 20px 18px;
        }

        .tf-boot-marketing-grid {
          grid-template-columns: minmax(0, 1fr);
        }

        .tf-boot-trip-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .tf-boot-trip-grid .tf-boot-trip-day:nth-child(n+4) {
          display: none;
        }

        .tf-boot-trip-summary {
          flex-direction: column;
          align-items: stretch;
        }

        .tf-boot-trip-toolbar {
          justify-content: flex-start;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .tf-boot-nav-link,
        .tf-boot-action-chip,
        .tf-boot-action-button,
        .tf-boot-line,
        .tf-boot-card,
        .tf-boot-metric,
        .tf-boot-trip-day,
        .tf-boot-trip-block,
        .tf-boot-trip-side-card,
        .tf-boot-trip-status,
        .tf-boot-trip-toolbar-pill {
          animation: none;
        }
      }
      
      /* Print Styles */
      @media print {
        @page { size: portrait; margin: 0.5cm; }
        body { background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        #root { height: auto; overflow: visible; }
        .no-print { display: none !important; }
        .print-only { display: block !important; }
        .timeline-scroll { overflow: visible !important; }
        /* Force expand timeline */
        .timeline-container { width: 100% !important; transform: scale(0.9); transform-origin: top left; }
      }

      /* Markdown Styles */
      .markdown-body ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 0.5em; }
      .markdown-body ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 0.5em; }
      .markdown-body a { color: var(--tf-primary); text-decoration: underline; }
      .markdown-body strong { font-weight: 700; color: #111827; }
      .markdown-body h3 { font-size: 1.1em; font-weight: 700; margin-top: 1em; margin-bottom: 0.5em; color: #374151; }
      
      /* Custom Checkbox Styling for Markdown */
      .markdown-body input[type="checkbox"] {
        appearance: none !important;
        -webkit-appearance: none !important;
        width: 1.1em !important;
        height: 1.1em !important;
        border: 2px solid #d1d5db !important; /* gray-300 */
        border-radius: 0.25rem !important;
        background-color: white !important;
        display: inline-block !important;
        vertical-align: text-bottom !important;
        margin-right: 0.5em !important;
        position: relative !important;
        cursor: pointer !important;
      }
      
      .markdown-body input[type="checkbox"]:checked {
        background-color: var(--tf-accent-500) !important;
        border-color: var(--tf-accent-500) !important;
        background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3e%3c/svg%3e") !important;
        background-size: 100% 100% !important;
        background-position: center !important;
        background-repeat: no-repeat !important;
      }
      
      /* Print override for checkbox to ensure visibility */
      @media print {
        .markdown-body input[type="checkbox"] {
          border-color: #9ca3af !important; /* gray-400 */
          background-color: white !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }
      }

      /* Google Places Autocomplete Fix */
      /* Ensures the dropdown appears above modals (which often use z-index > 1000) */
      .pac-container {
        z-index: 99999 !important;
      }
    </style>
    <script>
      (() => {
        const path = window.location.pathname || '/';
        const isTripLikeRoute = /^\/(?:[a-z]{2}(?:-[A-Z]{2})?\/)?(?:trip|s|example)(?:\/|$)/.test(path);
        if (isTripLikeRoute) {
          document.documentElement.setAttribute('data-tf-boot-route', 'trip');
        }
      })();
    </script>
</head>
  <body>
    <div id="root">
      <div class="tf-boot-shell" aria-hidden="true">
        <header class="tf-boot-header">
          <div class="tf-boot-header-inner">
            <div class="tf-boot-brand">
              <span class="tf-boot-logo-frame">
                <img class="tf-boot-logo-image" src="/favicon.svg" alt="" />
              </span>
              <span class="tf-boot-wordmark">TravelFlow</span>
            </div>
            <nav class="tf-boot-nav" aria-hidden="true">
              <span class="tf-boot-nav-link"></span>
              <span class="tf-boot-nav-link"></span>
              <span class="tf-boot-nav-link"></span>
              <span class="tf-boot-nav-link"></span>
              <span class="tf-boot-nav-link"></span>
            </nav>
            <div class="tf-boot-actions">
              <span class="tf-boot-action-chip tf-boot-action-chip--locale"></span>
              <span class="tf-boot-action-chip tf-boot-action-chip--login"></span>
              <span class="tf-boot-action-button"></span>
            </div>
          </div>
        </header>
        <main class="tf-boot-main">
          <section class="tf-boot-page tf-boot-page--marketing">
            <div class="tf-boot-hero">
              <div class="tf-boot-hero-lines">
                <div class="tf-boot-line tf-boot-line--headline"></div>
                <div class="tf-boot-line tf-boot-line--body-lg"></div>
                <div class="tf-boot-line tf-boot-line--body-md"></div>
                <div class="tf-boot-line tf-boot-line--body-sm"></div>
              </div>
              <div class="tf-boot-hero-actions" aria-hidden="true">
                <span class="tf-boot-hero-action tf-boot-hero-action--primary"></span>
                <span class="tf-boot-hero-action tf-boot-hero-action--secondary"></span>
              </div>
            </div>
            <div class="tf-boot-marketing-grid" aria-hidden="true">
              <div class="tf-boot-card"></div>
              <div class="tf-boot-card"></div>
              <div class="tf-boot-card"></div>
            </div>
            <div class="tf-boot-surface" aria-hidden="true"></div>
          </section>
          <section class="tf-boot-page tf-boot-page--trip">
            <div class="tf-boot-trip-status"></div>
            <div class="tf-boot-trip-summary">
              <div class="tf-boot-trip-summary-copy">
                <div class="tf-boot-line tf-boot-line--headline" style="width:min(420px,72%);"></div>
                <div class="tf-boot-line tf-boot-line--body-md" style="width:min(300px,56%);"></div>
              </div>
              <div class="tf-boot-trip-toolbar" aria-hidden="true">
                <span class="tf-boot-trip-toolbar-pill"></span>
                <span class="tf-boot-trip-toolbar-pill"></span>
                <span class="tf-boot-trip-toolbar-pill"></span>
              </div>
            </div>
            <div class="tf-boot-trip-layout">
              <section class="tf-boot-trip-canvas" aria-hidden="true">
                <div class="tf-boot-trip-grid">
                  <div class="tf-boot-trip-day"></div>
                  <div class="tf-boot-trip-day"></div>
                  <div class="tf-boot-trip-day"></div>
                  <div class="tf-boot-trip-day"></div>
                  <div class="tf-boot-trip-day"></div>
                </div>
                <div class="tf-boot-trip-body">
                  <div class="tf-boot-trip-block"></div>
                  <div class="tf-boot-trip-block tf-boot-trip-block--thin"></div>
                  <div class="tf-boot-trip-block"></div>
                </div>
              </section>
              <aside class="tf-boot-trip-sidebar" aria-hidden="true">
                <div class="tf-boot-trip-side-card tf-boot-trip-side-card--map"></div>
                <div class="tf-boot-metrics">
                  <div class="tf-boot-metric"></div>
                  <div class="tf-boot-metric"></div>
                </div>
              </aside>
            </section>
          </section>
        </main>
      </div>
    </div>
    <!-- Netlify Forms SPA registration scaffold -->
    <form
      name="contact"
      method="POST"
      data-netlify="true"
      netlify-honeypot="bot-field"
      hidden
      aria-hidden="true"
    >
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="reason" />
      <input type="text" name="subReason" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input type="text" name="currentPath" />
      <input type="text" name="lastVisitedPath" />
      <input type="text" name="locale" />
      <input type="text" name="contactSource" />
      <input type="text" name="userId" />
      <input type="text" name="plan" />
      <input type="text" name="appVersion" />
      <input type="text" name="bot-field" />
    </form>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
